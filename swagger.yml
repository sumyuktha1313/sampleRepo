openapi: 3.0.3
info:
  title: Attendence Management System
  description: |-
    Attendence Management System is a time tracker and leave management app that lets you track work hours and leave approvals of all employees across projects.
  termsOfService: http://localhost:8090
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11
servers:
  - url: https://ams.swagger.io/api/v3
tags:
  - name: Login
  - name: Signup
  - name: Task
  - name: Project
paths:
  /api/v1/login:
    post:
      tags:
        - Login
      description: 'user login'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                authCode:
                  type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        '201':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 201
                  response:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: '#/components/schemas/LoginResponse'
                      - type: object
                      - properties:
                          employee:
                            $ref: '#/components/schemas/Employee'
        '301':
          description: redirect to sign up page
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 301
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      redirectUri:
                        type: string
                        example: http://localhost:8080/signup
        '400':
          description: Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 400
                  response:
                    type: boolean
                    example: false
                  data:
                    type: object
                    properties:
                      status:
                        type: number
                        example: 400
                      message:
                        type: string
                        example: invalid auth code
                      restStatus:
                        type: string
                        example: "BAD_REQUEST"
        '503':
          description: Microsoft Service Unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 503
                  response:
                    type: boolean
                    example: false
                  data:
                    type: object
                    properties:
                      status:
                        type: number
                        example: 400
                      message:
                        type: string
                        example: microsoft service unavailable
                      restStatus:
                        type: string
                        example: "SERVICE_UNAVAILABLE"
  /api/v1/signup:
    post:
      tags:
        - Signup
      description: 'sign up form'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                emergencyContact:
                  type: string
                  example: +919894820022
      responses:
        '201':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 201
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Employee'
  /employees/{employeeId}/projects/{projectId}/tasks:
    post:
      tags:
        - Task
      description: 'To create the single task for given employee'
      parameters:
        - name: employeeId
          in: path
          description: id of the employee whose task need to be created
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          description: id of the project
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                taskName:
                  type: string
                taskDescription:
                  type: string
                taskDuration:
                  type: integer
                  format: int32
      responses:
        '201':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 201
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TaskGet'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /tasks/{taskId}:
    put:
      tags:
        - Task
      description: 'To update the single task for given task id'
      parameters:
        - name: taskId
          in: path
          description: Id of the task need to be updated
          required: True
          schema:
            type: integer
            format: numbers
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                taskName:
                  type: string
                taskDescription:
                  type: string
                taskDuration:
                  type: integer
                  format: int32
                taskStatus:
                  type: string
                  enum: [ "TODO", "IN_PROGRESS", "COMPLETED_ON_TIME", "COMPLETED_LATE" ]
                  default: TODO
      responses:
        '201':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 201
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskNotFound'
    get:
      tags:
        - Task
      description: 'get task details of provided task id'
      parameters:
        - name: taskId
          in: path
          description: id of the employee whose task need to be created
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskNotFound'
  /employees/{employeeId}/tasks/:
    get:
      tags:
        - Task
      description: get all the tasks of an employee
      parameters:
        - name: employeeId
          in: path
          description: id of the employee
          required: True
          schema:
            type: integer
        - name: projectId
          in: query
          description: Id of the task
          required: false
          explode: true
          schema:
            type: integer
            format: numbers
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      Tasks:
                        type: array
                        items:
                          $ref: '#/components/schemas/TaskGet'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeNotFound'
  /tasks/{id}:
    delete:
      tags:
        - Task
      description: To delete the single task
      parameters:
        - name: id
          in: path
          description: Id of the task need to be updated
          required: True
          schema:
            type: integer
            format: numbers
      responses:
        '200':
          description: successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: task removed successfully
        '404':
          description: task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskNotFound'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /projects/{projectId}:
    put:
      tags:
        - Project
      description: To update the project details.
      parameters:
        - name: projectId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                projectName:
                  type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
    get:
      tags:
        - Project
      description: get project details for given project id
      parameters:
        - name: projectId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
                      employees:
                        type: array
                        items:
                          $ref: '#/components/schemas/Employee'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /projects:
    get:
      tags:
        - Project
      description: get list of all projects details
      operationId: getAllProjects
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectGets'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
    post:
      tags:
        - Project
      description: create a new project
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                projectName:
                  type: string
      responses:
        '201':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 201
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /projects/{id}:
    delete:
      tags:
        - Project
      description: delete a project
      operationId: deleteProject
      parameters:
        - name: id
          in: path
          description: ID of project that needs to be fetched
          required: true
          schema:
            type: integer
            format: numbers
      responses:
        '200':
          description: successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: successfully deleted
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /employees/{employeeId}/projects/{projectId}:
    put:
      tags:
        - Project
      description: add project to an employee
      parameters:
        - name: projectId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
        - name: employeeId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/EmployeeGet'
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
    delete:
      tags:
        - Project
      description: To remove an employee from project.
      parameters:
        - name: projectId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
        - name: employeeId
          in: path
          description: id of the project
          required: True
          schema:
            type: integer
      responses:
        '200':
          description: successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 200
                  response:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: successfully deleted
        '400':
          description: Invalid  value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectNotFound'
components:
  schemas:
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: numbers
          example: 1
        name:
          type: string
          example: samyuktha
        officialId:
          type: string
          example: FC001
        image:
          type: string
          format: byte
        email:
          type: string
          example: Bharath@flyerssoft.com
        description:
          type: string
          example: software developer
        primaryManager:
          type: integer
          example: 1
        secondaryManager:
          type: integer
          example: 1
        workPlace:
          type: string
          example: chennai
        mobileNumber:
          type: string
          example: +91 7546786577
        emergencyContact:
          type: string
          example: +91 7546786577
        createdAt:
          type: string
          format: date-time
    EmployeeNotFound:
      type: object
      properties:
        statusCode:
          type: integer
          example: 404
        response:
          type: boolean
          example: false
        data:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Employee Not Found
            restStatus:
              type: string
              example: NOT_FOUND
    ProjectNotFound:
      type: object
      properties:
        statusCode:
          type: integer
          example: 404
        response:
          type: boolean
          example: false
        data:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Project Not Found
            restStatus:
              type: string
              example: NOT_FOUND
    TaskNotFound:
      type: object
      properties:
        statusCode:
          type: integer
          example: 404
        response:
          type: boolean
          example: false
        data:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Task Not Found
            restStatus:
              type: string
              example: NOT_FOUND
    BadRequest:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        response:
          type: boolean
          example: false
        data:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: Invalid Input
            restStatus:
              type: string
              example: BAD-REQUEST
    EmployeeGet:
      type: object
      properties:
        employee:
          $ref: '#/components/schemas/Employee'
        project:
          $ref: '#/components/schemas/Project'
    ProjectGets:
      type: object
      properties:
        project:
          $ref: '#/components/schemas/Project'
        task:
          $ref: '#/components/schemas/TaskGet'
    Task:
      type: object
      properties:
        id:
          type: integer
          format: numbers
          example: 1
        taskKey:
          type: string
          example: FS_TK_1
        taskName:
          type: string
          example: KAR-137(TICKET ID)
        taskDescription:
          type: string
          example: button need to be implemented
        taskDuration:
          type: integer
          description: the total hours taken by the employee to complete that task
          format: int32
          example: 8
        createdAt:
          type: string
          format: date-time
          example: 2017-07-21T17:32:28Z
        taskStatus:
          type: string
          enum: [ "TODO", "IN_PROGRESS", "COMPLETED_ON_TIME", "COMPLETED_LATE" ]
          default: TODO
        employee:
          $ref: '#/components/schemas/Employee'
        project:
          $ref: '#/components/schemas/Project'
    LoginResponse:
      type: object
      properties:
        expires_in:
          type: string
          example: 4416
        access_token:
          type: string
          example: eyJ0eXAiOiJKV1QiLCJub25jZSI6IjZOZnNhTXVBVW9iM2NSOWpHaUxGNU9uRzlVS09TZXM1TlAtLXJhOWE5SWsiLCJhbGciOiJSUzI1NiIsIng1dCI6Ii1LSTNROW5OUjdiUm9meG1lWm9YcWJIWkdldyIsImtpZCI6Ii1LSTNROW5OUjdiUm9meG1lWm9YcWJIWkdldyJ9
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
    Profile:
      type: object
      properties:
        businessPhones:
          type: array
          items:
            type: string
            example: "+919894820022"
        displayName:
          type: string
          example: Bharath Devarajan,
        givenName:
          type: string
          example: Bharath,
        jobTitle:
          type: string
          example: Associate Software Engineer ,
        mail:
          type: string
          example: bharath.d@flyerssoft.com,
        mobilePhone:
          type: string
          example: null,
        officeLocation:
          type: string
          example: null,
        preferredLanguage:
          type: string
          example: null,
        surname:
          type: string
          example: Devarajan,
        userPrincipalName:
          type: string
          example: bharath.d@flyerssoft.com,
        id:
          type: string
          example: 3ca66e42-570a-4259-9268-3175fc7c61cf
    TaskGet:
      type: object
      properties:
        id:
          type: integer
          format: numbers
          example: 1
        taskName:
          type: string
          example: KAR-137(TICKET ID)
        taskDescription:
          type: string
          example: button need to be implemented
        taskDuration:
          type: integer
          description: the total hours taken by the employee to complete that task
          format: int32
          example: 8
        taskStatus:
          type: string
          enum: [ "TODO", "PROGRESS", "COMPLETED" ]
          default: COMPLETED
        createdAt:
          type: string
          format: date-time
          example: 2017-07-21T17:32:28Z
      xml:
        name: category
    Project:
      type: object
      properties:
        id:
          type: integer
          example: 1
        projectName:
          type: string
          example: Eden Red
        EmployeeCount:
          type: integer
          example: 2
        createdAt:
          type: string
          format: date-time
          example: 2017-07-21T17:32:28Z

  requestBodies:
    Pet:
      description: ams object that needs to be added to the store
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Employee'
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Employee'
